name: fintle_app
description: A Fintle accounting companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.2.2
  fl_chart: ^0.68.0
  mobile_scanner: ^3.5.0

  share_plus: ^7.2.1
  open_file: ^3.3.2
  path_provider: ^2.1.1
  
  # For better UI
  animated_text_kit: ^4.2.2
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/